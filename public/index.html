<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <script src="index.js" defer></script>
    <title>Whiteboard.com</title>
  </head>
  <body>
    <main>
      <header>
        <h1>whiteboard</h1>
      </header>

      <div>
        <textarea id="postInput" maxlength="300" rows="3" placeholder="Write something..."></textarea>
        <div>
          <span id="charCount">0 / 300</span>
          <button onclick="savePost()">Post</button>
        </div>
      </div>

      <div id="board"></div>
    </main>

    <footer>
      <a href="https://github.com/marvinalegre/whiteboard" target="_blank">source code</a>
    </footer>
  </body>
</html>
